<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        .main {
            background-image: url(juni/images/hero-banner.png);
            height: 659px;
            background-size: max(1200px, 100vw);
            background-repeat: no-repeat;
            background-position: center 1px;

        }

        img {
            width: 155px;
            display: block;
        }

        .logo {
            padding-left: 44px;
            margin-top: 13px;

        }

        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: white;
            height: 75px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        .nav-links a {
            text-decoration: none;
            color: #0f172a;
            font-weight: 500;
        }

        .icon-container {
            display: flex;
            align-items: center;
            gap: 24px;
            background-color: #ffffff;
            padding: 15px;

            cursor: pointer;
        }

        .icon-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 23px;
            height: 23px;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
        }

        .hero-content {
            width: 45%;
            z-index: 2;

        }

        .subtitle {
            font-size: 32px;
            font-weight: 300;
            color: #334155;
            margin-bottom: 5px;
        }

        .title {
            font-size: 48px;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .description {
            font-size: 17px;
            color: #22272e;
            line-height: 1.6;
            margin-bottom: 4px;
            min-width: 675px;
            padding-left: 161px;
           text-align: justify;
           
        }

        .btn-shop {
                       background-color: #ff6f61;
            color: white;
            padding: 12px 30px;
                       font-weight: 600;
                       cursor: pointer;
                       border-color:#ff6f61;
         
        }

        .btn-shop i {
            margin-left: 8px;
            font-size: 14px;
        }

        .btn-shop:hover {
            background-color: #e55b4e;
            transform: translateY(-2px);
        }

        .arrow-icon {
            display: inline-block;
            vertical-align: middle;
        }

        .hero-content {
            font-family: 'Martel Sans', sans-serif;
            height: calc(100% - 100px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            position: relative;
            gap: 23px;
            padding: 0 30px;
        }
        
    </style>
</head>

<body>
    <div class="main">
        <nav>
            <div class="navbar-container">

                <div class="logo">
                    <img src="juni/images/logo.svg" alt="">
                </div>
                <div class="nav-links">
                    <a href="#">Home</a>
                    <a href="#">About</a>
                    <a href="#">Products</a>
                    <a href="#">Shop</a>
                    <a href="#">Blog</a>
                    <a href="#">Contact</a>
                </div>
                <div class="icon-container">
                    <div class="icon-wrapper">
                        <img src="https://unpkg.com/lucide-static@latest/icons/search.svg" alt="Search"
                            class="nav-icon">
                    </div>

                    <div class="icon-wrapper">
                        <img src="https://unpkg.com/lucide-static@latest/icons/user.svg" alt="Profile" class="nav-icon">
                    </div>

                    <div class="icon-wrapper">
                        <img src="https://unpkg.com/lucide-static@latest/icons/heart.svg" alt="Wishlist"
                            class="nav-icon">
                    </div>

                    <div class="icon-wrapper">
                        <img src="https://unpkg.com/lucide-static@latest/icons/shopping-bag.svg" alt="Cart"
                            class="nav-icon">
                    </div>

                </div>
        </nav>
        >
        <div class="hero-content">
            <p class="subtitle">New Summer</p>
            <h1 class="title">Shoes Collection</h1>
            <p class="description">
                Competently expedite alternative benefits whereas leading-edge catalysts for change.
                Globally leverage existing an expanded array of leadership.
            </p>
            <button class="btn-shop">
                Shop Now
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="arrow-icon"
                    viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                        d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z" />
                </svg>
            </button>
        </div>
    </div>

</body>

</html>
